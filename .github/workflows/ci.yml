name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dev tools
        run: |
          pip install flake8 pylint black isort bandit pre-commit
          pre-commit install
          pre-commit run --all-files
      - name: Run flake8
        run: flake8 .
      - name: Run pylint
        run: pylint **/*.py
      - name: Run black check
        run: black --check .
      - name: Run isort check
        run: isort --check-only .

  test-python:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: learnnov-cloud
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage
      - name: Run tests with coverage
        working-directory: learnnov-cloud
        run: |
          coverage run -m pytest
          coverage xml -o coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: learnnov-cloud/coverage.xml

  test-js:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install JS dependencies
        working-directory: openedx-platform-master
        run: npm ci
      - name: Run Jest tests with coverage
        working-directory: openedx-platform-master
        run: npm run test-jest -- --coverage
      - name: Upload JS coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: openedx-platform-master/coverage/coverage-final.json
      - name: Run Karma tests
        working-directory: openedx-platform-master
        run: npm run test-karma
