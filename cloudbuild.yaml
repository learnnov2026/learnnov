# =============================================================================
# cloudbuild.yaml — Google Cloud Build CI/CD Pipeline
# يُشغَّل تلقائياً عند كل push إلى الفرع الرئيسي
# =============================================================================

steps:
  # ── الخطوة 1: بناء Docker image ───────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.prod'
      - '-t'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/learnnov/learnnov-cloud:$COMMIT_SHA'
      - '-t'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/learnnov/learnnov-cloud:latest'
      - '.'

  # ── الخطوة 1.5: فحص أمان الصورة باستخدام Trivy ───────────────────────────
  - name: 'aquasec/trivy:latest'
    id: 'scan-image'
    args:
      - 'image'
      - '--exit-code=0' # تغيير إلى 1 لإيقاف البناء في حالة الثغرات الحرجة
      - '--severity=CRITICAL,HIGH'
      - '--no-progress'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/learnnov/learnnov-cloud:$COMMIT_SHA'
    waitFor: ['build-image']

  # ── الخطوة 2: رفع الصورة إلى Artifact Registry ───────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/learnnov/learnnov-cloud'
    waitFor: ['scan-image']

  # ── الخطوة 3: الحصول على بيانات الاتصال بـ GKE ────────────────────────────
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'get-credentials'
    args:
      - 'run'
      - '--filename=learnnov-cloud/k8s/'
      - '--image=me-central1-docker.pkg.dev/$PROJECT_ID/learnnov/learnnov-cloud:$COMMIT_SHA'
      - '--location=me-central1'
      - '--cluster=learnnov-cluster'
    waitFor: ['push-image']

  # ── الخطوة 4: تحديث صورة الـ Deployment ───────────────────────────────────
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'deploy'
    args:
      - 'set'
      - 'image'
      - 'deployment/learnnov-cloud'
      - 'learnnov-cloud=me-central1-docker.pkg.dev/$PROJECT_ID/learnnov/learnnov-cloud:$COMMIT_SHA'
      - '-n'
      - 'learnnov'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=me-central1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=learnnov-cluster'
    waitFor: ['get-credentials']

  # ── الخطوة 5: تشغيل Migrations ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'run-migrations'
    args:
      - 'exec'
      - 'deployment/learnnov-cloud'
      - '-n'
      - 'learnnov'
      - '--'
      - 'python'
      - 'manage.py'
      - 'migrate'
      - '--noinput'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=me-central1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=learnnov-cluster'
    waitFor: ['deploy']

  # ── الخطوة 6: التحقق من النشر ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'verify'
    args:
      - 'rollout'
      - 'status'
      - 'deployment/learnnov-cloud'
      - '-n'
      - 'learnnov'
      - '--timeout=300s'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=me-central1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=learnnov-cluster'
    waitFor: ['run-migrations']

# ── الصور المُنشأة ──────────────────────────────────────────────────────────
images:
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/learnnov/learnnov-cloud:$COMMIT_SHA'
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/learnnov/learnnov-cloud:latest'

# ── الإعدادات ────────────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'  # 30 دقيقة كحد أقصى
