version: '3.8'

services:
  db:
    image: postgres:15-alpine
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: learnnov
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: learnnov_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "learnnov"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  learnnov-cloud:
    build:
      context: .
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ./learnnov-cloud/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://learnnov:${POSTGRES_PASSWORD}@db:5432/learnnov_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./learnnov-cloud:/app
    ports:
      - "8000:8000"

  openedx-platform:
    # Official Open edX image – customize tag as required
    image: edxops/edxapp:latest
    env_file:
      - ./.env
    environment:
      SERVICE_VARIANT: lms
      LMS_HOST: 0.0.0.0
      CMS_HOST: 0.0.0.0
      DB_HOST: db
      DB_NAME: learnnov_db
      DB_USER: learnnov
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8001:8000"
    volumes:
      - ./openedx-platform-master:/edx/app/edx-platform
  clamav:
    image: clamav/clamav:latest
    ports:
      - "3310:3310"
    restart: on-failure

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - learnnov-cloud
      - openedx-platform

volumes:
  pgdata:
