<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستشار الأمان التفاعلي - LearnNov</title>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        p.desc {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .examples {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .examples span {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-left: 10px;
            align-self: center;
        }

        .example-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        .example-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .input-area {
            position: relative;
        }

        textarea {
            width: 100%;
            background-color: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 1rem;
            border-radius: 8px;
            min-height: 120px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
            transition: background-color 0.2s ease;
            width: 100%;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        .submit-btn:disabled {
            background-color: var(--border);
            cursor: not-allowed;
            color: var(--text-muted);
        }

        #result {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: none;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .loader {
            display: none;
            margin-top: 1rem;
            text-align: center;
            color: var(--primary);
            font-weight: bold;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(37, 99, 235, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .copy-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ مستشار الأمان التفاعلي</h1>
    <p class="desc">اكتب سيناريو أو مشكلة أمنية تواجهها في منصتك، وسيحللها لك مستشار الأمان المدعوم بنموذج GPT-4 لتقديم خطة حماية شاملة وحلول برمجية.</p>

    <div class="examples">
        <span>أمثلة سريعة:</span>
        <button class="example-btn" onclick="fillExample('اكتشفنا محاولات وصول غير مصرح لملفات الكورسات المدفوعة عبر تخمين الروابط، كيف نحميها؟')">وصول غير مصرح</button>
        <button class="example-btn" onclick="fillExample('نحتاج بناء نظام صلاحيات يمنع المدربين من حذف محتوى مدربين آخرين')">نظام الصلاحيات</button>
        <button class="example-btn" onclick="fillExample('كيف نمنع الطلاب من تصوير الشاشة أو تحميل الفيديوهات التعليمية؟')">حماية المحتوى</button>
        <button class="example-btn" onclick="fillExample('هناك تلاعب في وقت الاختبارات عبر تعديل جافاسكريبت المتصفح، ما هو الحل؟')">أمان الاختبارات</button>
    </div>

    <div class="input-area">
        <textarea id="scenario" placeholder="اكتب سؤالك أو سيناريو الثغرة هنا..."></textarea>
    </div>

    <button id="submitBtn" class="submit-btn" onclick="analyzeScenario()">تحليل المشكلة</button>
    
    <div id="loader" class="loader"><div class="spinner"></div> جاري التحليل واستشارة خبير الأمن السيبراني...</div>
    
    <div id="result"></div>
</div>

<script>
    // Get CSRF Token from cookies (Django standard)
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Handle Ctrl+Enter to submit
    document.getElementById('scenario').addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            analyzeScenario();
        }
    });

    async function copyResult() {
        const textToCopy = document.getElementById('analysis-content').innerText;
        try {
            await navigator.clipboard.writeText(textToCopy);
            const btn = document.querySelector('.copy-btn');
            const originalText = btn.innerText;
            btn.innerText = 'تم النسخ!';
            btn.style.color = 'var(--success)';
            btn.style.borderColor = 'var(--success)';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = 'var(--text)';
                btn.style.borderColor = 'var(--border)';
            }, 2000);
        } catch (err) {
            console.error('Failed to copy text: ', err);
        }
    }

    function fillExample(text) {
        document.getElementById('scenario').value = text;
    }

    async function analyzeScenario() {
        const scenario = document.getElementById('scenario').value.trim();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('result');

        if (!scenario) return;

        btn.disabled = true;
        loader.style.display = 'block';
        resultBox.style.display = 'none';
        resultBox.innerHTML = '';

        try {
            const response = await fetch('/api/ai/security-advisor/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ scenario: scenario })
            });

            const data = await response.json();

            if (response.ok) {
                // Use Marked.js to parse Markdown
                const parsedHTML = marked.parse(data.analysis);
                
                // Add header with Copy button
                resultBox.innerHTML = `
                    <div class="result-header">
                        <strong>التحليل الأمني:</strong>
                        <button class="copy-btn" onclick="copyResult()">نسخ الإجابة</button>
                    </div>
                    <div id="analysis-content">${parsedHTML}</div>
                `;
                
                // Apply syntax highlighting
                document.querySelectorAll('#analysis-content pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
                
                resultBox.style.borderColor = 'var(--success)';
            } else {
                resultBox.innerHTML = `<span style="color: var(--danger)">خطأ: ${data.error || 'حدث خطأ غير معروف.'}</span>`;
                resultBox.style.borderColor = 'var(--danger)';
            }
            resultBox.style.display = 'block';

        } catch (error) {
            resultBox.innerHTML = `<span style="color: var(--danger)">فشل الاتصال بالخادم. تأكد من إعدادات الشبكة ومفتاح API.</span>`;
            resultBox.style.borderColor = 'var(--danger)';
            resultBox.style.display = 'block';
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
