apiVersion: apps/v1
kind: Deployment
metadata:
  name: learnnov-grafana
  namespace: learnnov
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: learnnov-secrets
                  key: POSTGRES_PASSWORD # using db pass temporarily as admin pass, can be customized later
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: learnnov
spec:
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
