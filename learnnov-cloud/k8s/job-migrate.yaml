# =============================================================================
# وظيفة تهجير قاعدة البيانات (Migration Job) لمنصة ليرن نوف
# تقوم بتنفيذ تهجير قاعدة البيانات وجمع الملفات الثابتة
# يجب تشغيلها عند كل نشر جديد أو تحديث لنموذج قاعدة البيانات
#
# طريقة التشغيل:
#   kubectl apply -f job-migrate.yaml
#   kubectl -n learnnov logs -f job/learnnov-migrate
#
# ⚠️ لإعادة التشغيل، يجب حذف الوظيفة السابقة أولاً:
#   kubectl -n learnnov delete job learnnov-migrate
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: learnnov-migrate
  namespace: learnnov
  labels:
    app.kubernetes.io/name: learnnov
    app.kubernetes.io/component: migration
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "وظيفة تهجير قاعدة البيانات وجمع الملفات الثابتة"
spec:
  # عدد محاولات إعادة التشغيل عند الفشل
  backoffLimit: 3
  # مهلة الوظيفة بالثواني (10 دقائق)
  activeDeadlineSeconds: 600
  # حذف الوظيفة تلقائياً بعد اكتمالها بـ 5 دقائق
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: learnnov
        app.kubernetes.io/component: migration
    spec:
      # لا يتم إعادة التشغيل أبداً - الوظيفة تنجح أو تفشل
      restartPolicy: Never

      # حساب الخدمة المرتبط بـ Workload Identity
      serviceAccountName: learnnov-sa

      # سياق الأمان
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

      containers:
        # =====================
        # حاوية التهجير
        # =====================
        - name: migrate
          image: me-central1-docker.pkg.dev/project-26dbc415-dd49-4210-ada/learnnov/learnnov-cloud:latest
          imagePullPolicy: Always

          # تنفيذ التهجير ثم جمع الملفات الثابتة
          command:
            - "/bin/sh"
            - "-c"
            - |
              echo "=== بدء تهجير قاعدة البيانات ==="
              python manage.py migrate --noinput
              echo "=== اكتمل التهجير بنجاح ==="
              echo "=== بدء جمع الملفات الثابتة ==="
              python manage.py collectstatic --noinput
              echo "=== اكتمل جمع الملفات الثابتة ==="
              echo "=== تمت جميع العمليات بنجاح ==="

          # تحميل المتغيرات البيئية
          envFrom:
            - configMapRef:
                name: learnnov-config
            - secretRef:
                name: learnnov-secrets

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: learnnov-secrets
                  key: database-url

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

        # =====================
        # حاوية Cloud SQL Auth Proxy الجانبية
        # =====================
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
          args:
            - "--structured-logs"
            - "project-26dbc415-dd49-4210-ada:me-central1:learnnov-db"
            # إيقاف البروكسي تلقائياً عند انتهاء وظيفة التهجير
            - "--quitquitquit"

          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
