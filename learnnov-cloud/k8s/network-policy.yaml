# =============================================================================
# سياسة الشبكة (Network Policy) لمنصة ليرن نوف
# تضمن تأمين الاتصالات داخل الـ Namespace ومنع الوصول غير المصرح به
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: learnnov
  labels:
    app.kubernetes.io/name: learnnov
spec:
  podSelector: {} # يطبق على كل البودات في الـ namespace
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # السماح بجميع الاتصالات الداخلية بين البودات داخل نفس الـ namespace
  - from:
    - podSelector: {}
  egress:
  # السماح بجميع الاتصالات الخارجية (للإنترنت و GCP APIs) 
  - to: []

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-ingress
  namespace: learnnov
  labels:
    app.kubernetes.io/name: learnnov
spec:
  # يطبق فقط على البودات التي تستقبل طلبات من Ingress/LoadBalancer
  podSelector:
    matchExpressions:
      - {key: app.kubernetes.io/component, operator: In, values: [django, openedx]}
  policyTypes:
  - Ingress
  ingress:
  - from:
    # السماح بحركة المرور من الـ Ingress Controller (GCE L7 Load Balancer)
    - namespaceSelector: {}
    - ipBlock:
        cidr: 130.211.0.0/22 # نطاقات فحص صحة GCE
    - ipBlock:
        cidr: 35.191.0.0/16
