# =============================================================================
# الأسرار (Secrets) لمنصة ليرن نوف
# تحتوي على جميع البيانات الحساسة مثل كلمات المرور ومفاتيح API
#
# ⚠️ تنبيه مهم: يجب استبدال جميع القيم بقيم حقيقية مشفرة بـ base64
# لتشفير قيمة: echo -n 'القيمة' | base64
# لفك تشفير قيمة: echo 'القيمة_المشفرة' | base64 -d
#
# ⚠️ لا تقم أبداً بحفظ هذا الملف مع القيم الحقيقية في Git
# استخدم أداة مثل sealed-secrets أو external-secrets بدلاً من ذلك
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: learnnov-secrets
  namespace: learnnov
  labels:
    app.kubernetes.io/name: learnnov
    app.kubernetes.io/component: secrets
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # وصف: قالب الأسرار - يجب تحديث القيم قبل النشر
    description: "قالب الأسرار لمنصة ليرن نوف - يجب تحديث جميع القيم قبل النشر"
type: Opaque
data:
  # =====================
  # مفتاح جانغو السري
  # =====================
  # مفتاح سري فريد لتأمين جلسات المستخدمين والتوقيعات
  # قم بإنشاء مفتاح عشوائي: python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
  # ثم شفّره: echo -n 'المفتاح_العشوائي' | base64
  django-secret-key: "REPLACE_WITH_BASE64_ENCODED_SECRET_KEY"

  # =====================
  # رابط قاعدة البيانات
  # =====================
  # الصيغة: postgres://learnnov:PASSWORD@127.0.0.1:5432/learnnov_db
  # يستخدم 127.0.0.1 لأن Cloud SQL Proxy يعمل كحاوية جانبية على نفس البود
  # قم بتشفير الرابط الكامل مع كلمة المرور الفعلية
  # echo -n 'postgres://learnnov:YOUR_PASSWORD@127.0.0.1:5432/learnnov_db' | base64
  database-url: "cG9zdGdyZXM6Ly9sZWFybm5vdjpQQVNTV09SREAxMjcuMC4wLjE6NTQzMi9sZWFybm5vdl9kYg=="

  # =====================
  # مفاتيح Stripe لمعالجة المدفوعات الدولية
  # =====================
  # المفتاح السري لـ Stripe - يُستخدم في الخادم فقط
  # echo -n 'sk_live_...' | base64
  stripe-secret-key: ""

  # المفتاح العام لـ Stripe - يُستخدم في الواجهة الأمامية
  # echo -n 'pk_live_...' | base64
  stripe-publishable-key: ""

  # سر webhook لـ Stripe - للتحقق من صحة الإشعارات
  # echo -n 'whsec_...' | base64
  stripe-webhook-secret: ""

  # =====================
  # مفاتيح HyperPay لمعالجة المدفوعات المحلية (مدى/فيزا)
  # =====================
  # رمز الوصول لـ HyperPay
  # echo -n 'ACCESS_TOKEN' | base64
  hyperpay-access-token: ""

  # معرف كيان فيزا في HyperPay
  # echo -n 'ENTITY_ID' | base64
  hyperpay-entity-visa: ""

  # معرف كيان مدى في HyperPay
  # echo -n 'ENTITY_ID' | base64
  hyperpay-entity-mada: ""
