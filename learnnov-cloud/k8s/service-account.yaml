# =============================================================================
# حساب الخدمة (ServiceAccount) لمنصة ليرن نوف
# مرتبط بـ GCP Workload Identity لتمكين الوصول الآمن إلى خدمات Google Cloud
# بدون الحاجة إلى مفاتيح خدمة (Service Account Keys)
#
# متطلبات مسبقة - يجب تنفيذ هذه الأوامر في Google Cloud:
#
# 1. إنشاء حساب خدمة GCP:
#    gcloud iam service-accounts create learnnov-gke-sa \
#      --display-name="LearnNov GKE Service Account" \
#      --project=project-26dbc415-dd49-4210-ada
#
# 2. منح الصلاحيات المطلوبة:
#    # صلاحية الوصول إلى Cloud SQL
#    gcloud projects add-iam-policy-binding project-26dbc415-dd49-4210-ada \
#      --member="serviceAccount:learnnov-gke-sa@project-26dbc415-dd49-4210-ada.iam.gserviceaccount.com" \
#      --role="roles/cloudsql.client"
#
#    # صلاحية الوصول إلى Cloud Storage (للنسخ الاحتياطية)
#    gcloud projects add-iam-policy-binding project-26dbc415-dd49-4210-ada \
#      --member="serviceAccount:learnnov-gke-sa@project-26dbc415-dd49-4210-ada.iam.gserviceaccount.com" \
#      --role="roles/storage.objectAdmin"
#
#    # صلاحية قراءة الصور من Artifact Registry
#    gcloud projects add-iam-policy-binding project-26dbc415-dd49-4210-ada \
#      --member="serviceAccount:learnnov-gke-sa@project-26dbc415-dd49-4210-ada.iam.gserviceaccount.com" \
#      --role="roles/artifactregistry.reader"
#
#    # صلاحية قراءة الأسرار من Secret Manager
#    gcloud projects add-iam-policy-binding project-26dbc415-dd49-4210-ada \
#      --member="serviceAccount:learnnov-gke-sa@project-26dbc415-dd49-4210-ada.iam.gserviceaccount.com" \
#      --role="roles/secretmanager.secretAccessor"
#
# 3. ربط Workload Identity:
#    gcloud iam service-accounts add-iam-policy-binding \
#      learnnov-gke-sa@project-26dbc415-dd49-4210-ada.iam.gserviceaccount.com \
#      --role="roles/iam.workloadIdentityUser" \
#      --member="serviceAccount:project-26dbc415-dd49-4210-ada.svc.id.goog[learnnov/learnnov-sa]"
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: learnnov-sa
  namespace: learnnov
  labels:
    app.kubernetes.io/name: learnnov
    app.kubernetes.io/component: service-account
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # ربط حساب الخدمة في Kubernetes بحساب الخدمة في GCP عبر Workload Identity
    # هذا يسمح للبودات بالمصادقة تلقائياً مع خدمات Google Cloud
    iam.gke.io/gcp-service-account: "learnnov-gke-sa@project-26dbc415-dd49-4210-ada.iam.gserviceaccount.com"
    description: "حساب الخدمة الرئيسي لمنصة ليرن نوف مع Workload Identity"
