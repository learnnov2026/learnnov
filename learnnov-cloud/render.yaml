services:
  - type: web
    name: learnnov-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py shell -c "from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin', 'albra.edu@gmail.com', 'Admin@LearnNov2026!')"
      python manage.py seed_data
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: learnnov-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: HYPERPAY_ACCESS_TOKEN
        sync: false
      - key: HYPERPAY_ENTITY_VISA
        sync: false
      - key: HYPERPAY_ENTITY_MADA
        sync: false
      - key: HYPERPAY_BASE_URL
        value: "https://eu-prod.oppwa.com"

databases:
  - name: learnnov-db
    plan: free
