services:
  - type: web
    name: learnnov-cloud
    env: python
    buildCommand: "cd learnnov-cloud && chmod +x build.sh && ./build.sh"
    startCommand: "cd learnnov-cloud && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: learnnov-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "learnnov-cloud.onrender.com"
      - key: CORS_ALLOW_ALL
        value: "True"

databases:
  - name: learnnov-db
    databaseName: learnnov
    user: learnnov_user
    plan: free
